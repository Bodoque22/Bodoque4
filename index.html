<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Lumber Inc - Diamantes Infinitos</title>
    <style>
        body { margin:0; background:#111; color:#0f0; font-family:Arial, sans-serif; text-align:center; }
        iframe { width:100%; height:100vh; border:none; }
        .cheats { 
            position:fixed; top:10px; left:10px; background:rgba(0,0,0,0.85); 
            padding:15px; border-radius:10px; z-index:999; border:2px solid #0f0;
        }
        button { 
            margin:5px; padding:12px 15px; background:#0f0; color:#000; 
            border:none; border-radius:5px; cursor:pointer; font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="cheats">
        <h2>💎 Idle Lumber Inc - Cheats</h2>
        <button onclick="copyCheat('diamonds = Infinity; money = Infinity;')">Diamantes + Dinero Infinito</button><br>
        <button onclick="copyCheat('diamonds = 999999999;')">Diamantes 999 Millones</button>
        <p><small>Espera que cargue el juego → Presiona Ctrl + Shift + J → Pega el código</small></p>
    </div>

    <iframe src="https://pizza-edition-unblocked.github.io/game/idle-lumber-inc.html" allowfullscreen></iframe>

    <script>
        function copyCheat(code) {
            navigator.clipboard.writeText(code).then(() => {
                alert("✅ Código copiado!\n\nAhora abre la consola (Ctrl + Shift + J) y pega con Ctrl + V");
            });
        }
    </script>
</body>
</html>
