<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Lumber Inc - Diamantes Infinitos</title>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:Arial; text-align:center; }
        iframe { width:100%; height:100vh; border:none; }
        .cheats { position:fixed; top:10px; left:10px; background:rgba(0,0,0,0.8); padding:15px; border-radius:10px; z-index:999; }
        button { margin:5px; padding:10px; background:#0f0; color:#000; border:none; cursor:pointer; }
    </style>
</head>
<body>
    <div class="cheats">
        <h2>💎 CHEATS - Idle Lumber Inc</h2>
        <button onclick="copyCheat('diamonds = Infinity; money = Infinity;')">Diamantes + Dinero Infinito</button><br>
        <button onclick="copyCheat('diamonds = 999999999;')">Diamantes 999 Millones</button>
        <p><small>Presiona Ctrl + Shift + J después de cargar el juego</small></p>
    </div>

    <iframe src="https://pizza-edition-unblocked.github.io/game/idle-lumber-inc.html" allowfullscreen></iframe>

    <script>
        function copyCheat(code) {
            navigator.clipboard.writeText(code);
            alert("✅ Código copiado! Ahora abre la consola con Ctrl + Shift + J y pega (Ctrl + V)");
        }
    </script>
</body>
</html>
